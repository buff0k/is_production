{% extends "templates/web.html" %}

{% block page_content %}
<style>
html,
body {
    background: #ffffff !important;
    overflow: hidden !important;
}

header,
footer,
.web-footer,
.navbar,
.page-breadcrumbs,
.page-header,
.page-footer,
.footer-powered {
    display: none !important;
}

.web-page,
.page_content,
.page-content,
.page-content-wrapper,
main,
.container,
.container-fluid {
    max-width: none !important;
    width: 100% !important;
    padding: 0 !important;
    margin: 0 !important;
}

#portal-site-volume-graphs-app {
    position: fixed;
    inset: 0;
    z-index: 9999;
    background: #ffffff;
    overflow: auto;
    padding: 12px;
    box-sizing: border-box;
    font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    color: #1f272e;
}

.portal-topbar {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 10px;
    padding: 0 2px;
}

.portal-title {
    font-size: 16px;
    font-weight: 700;
    margin: 0;
    line-height: 32px;
    color: #111827;
    white-space: nowrap;
}

.portal-filter {
    width: 320px;
    position: relative;
}

.portal-filter input {
    width: 100%;
    height: 32px;
    border-radius: 8px;
    border: 1px solid #d1d8dd;
    padding: 4px 10px;
    background: #f7f7f7;
    color: #111827;
    font-size: 14px;
    outline: none;
}

.portal-filter input:focus {
    border-color: #9aa8b5;
    background: #ffffff;
}

.portal-dropdown {
    position: absolute;
    top: calc(100% + 4px);
    left: 0;
    right: 0;
    z-index: 10000;
    background: #fff;
    border: 1px solid #d1d8dd;
    border-radius: 8px;
    box-shadow: 0 6px 18px rgba(0,0,0,0.12);
    max-height: 260px;
    overflow-y: auto;
    display: none;
}

.portal-option {
    padding: 10px 12px;
    cursor: pointer;
    border-bottom: 1px solid #f3f3f3;
    font-size: 13px;
}

.portal-option:hover {
    background: #f7fafc;
}

.portal-empty {
    padding: 10px 12px;
    color: #6c757d;
    font-size: 13px;
}

#dashboard_status {
    margin: 0 0 10px 0;
    padding: 0 2px;
    color: #6c757d;
    font-size: 14px;
}

#dashboard_content {
    width: 100%;
}

#dashboard_content.isd-dashboard-grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 12px;
    align-items: start;
    width: 100%;
}

#dashboard_content .isd-dashboard-card {
    width: 100%;
    min-width: 0;
    background: #ffffff;
    border: 1px solid #d8dfe6;
    border-radius: 10px;
    overflow: hidden;
    box-shadow: 0 1px 3px rgba(15, 23, 42, 0.08);
    margin: 0;
}

#dashboard_content .isd-dashboard-card-header {
    padding: 12px 14px;
    font-size: 13px;
    line-height: 1.25;
    font-weight: 400;
    color: #111827;
}

#dashboard_content .isd-dashboard-card-title {
    display: block;
    font-weight: 700;
    font-size: 13px;
}

#dashboard_content .isd-dashboard-card-subtitle {
    display: block;
    font-weight: 400;
    font-size: 12px;
    margin-top: 5px;
    line-height: 1.3;
}

#dashboard_content .isd-dashboard-chart {
    width: 100%;
    height: 300px;
    padding: 16px 18px 14px 18px;
    background: #ffffff;
    box-sizing: border-box;
}

#dashboard_content canvas {
    display: block !important;
    width: 100% !important;
    height: 100% !important;
    max-width: 100% !important;
}

@media (max-width: 1100px) {
    #dashboard_content.isd-dashboard-grid {
        grid-template-columns: 1fr;
    }

    #dashboard_content .isd-dashboard-chart {
        height: 300px;
    }
}

@media (max-width: 700px) {
    #portal-site-volume-graphs-app {
        padding: 6px;
    }

    .portal-topbar {
        flex-direction: column;
        align-items: flex-start;
        gap: 6px;
    }

    .portal-filter {
        width: 100%;
    }

    #dashboard_content .isd-dashboard-chart {
        height: 240px;
        padding: 12px 10px;
    }
}
</style>

<div id="portal-site-volume-graphs-app">
    <div class="portal-topbar">
        <h1 class="portal-title">Site Volume Graphs</h1>

        <div class="portal-filter">
            <input
                type="text"
                id="monthly_production_plan"
                placeholder="Search Define Monthly Production"
                autocomplete="off"
            >
            <div id="monthly_production_plan_dropdown" class="portal-dropdown"></div>
        </div>
    </div>

    <div id="dashboard_status">Select a Define Monthly Production to load the graphs.</div>
    <div id="dashboard_content" class="isd-dashboard-grid"></div>
</div>

<script>
(function () {
    "use strict";

    const STORAGE_KEY = "portal_site_volume_graphs_monthly_production_plan";

    const WATCHDOG_INTERVAL_MS = 60 * 1000;
    const AJAX_TIMEOUT_MS = 2 * 60 * 1000;
    const CHARTJS_TIMEOUT_MS = 30 * 1000;
    const WAKE_REFRESH_AFTER_MS = 2 * 60 * 1000;

    const TARGET_LINE_COLOR = "#9E9E9E";
    const ACTUAL_ABOVE_TARGET_COLOR = "#2fb344";
    const ACTUAL_BELOW_TARGET_COLOR = "#e24c4c";
    const CURRENT_DATE_POINT_COLOR = "#2fb344";

    const TARGET_POINT_RADIUS = 3;
    const ACTUAL_POINT_RADIUS = 3;
    const CURRENT_DATE_POINT_RADIUS = 3.75;

    const DEFAULT_Y_AXIS_STEP = 10000;

    const input = document.getElementById("monthly_production_plan");
    const dropdown = document.getElementById("monthly_production_plan_dropdown");
    const statusEl = document.getElementById("dashboard_status");
    const dashEl = document.getElementById("dashboard_content");

    let _charts = [];
    let _refreshing = false;
    let _timer = null;
    let _watchdog = null;
    let _lastSuccessAt = 0;
    let _lastSlotKeyRefreshed = "";
    let _lastLoadFailed = false;
    let _requestSeq = 0;

    function escapeHtml(value) {
        return String(value == null ? "" : value)
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;")
            .replace(/'/g, "&#39;");
    }

    function normaliseInt(value) {
        const parsed = parseInt(value, 10);
        return Number.isFinite(parsed) ? parsed : 0;
    }

    function normaliseFloat(value) {
        const parsed = parseFloat(value);
        return Number.isFinite(parsed) ? parsed : 0;
    }

    function formatTime(date) {
        return date.toLocaleTimeString([], {
            hour: "2-digit",
            minute: "2-digit"
        });
    }

    function pad2(value) {
        return String(value).padStart(2, "0");
    }

    function slotKey(date) {
        return (
            date.getFullYear() + "-" +
            pad2(date.getMonth() + 1) + "-" +
            pad2(date.getDate()) + " " +
            pad2(date.getHours()) + ":" +
            pad2(date.getMinutes())
        );
    }

    function mostRecentRefreshSlot(now) {
        const slot = new Date(now.getTime());
        slot.setSeconds(0, 0);

        const minutes = slot.getMinutes();

        if (minutes >= 30) {
            slot.setMinutes(30);
        } else if (minutes >= 10) {
            slot.setMinutes(10);
        } else {
            slot.setHours(slot.getHours() - 1);
            slot.setMinutes(30);
        }

        return slot;
    }

    function msUntilNextRefresh() {
        const now = new Date();
        const next = new Date(now.getTime());
        next.setSeconds(0, 0);

        const minutes = now.getMinutes();

        if (minutes < 10) {
            next.setMinutes(10);
        } else if (minutes < 30) {
            next.setMinutes(30);
        } else {
            next.setHours(next.getHours() + 1);
            next.setMinutes(10);
        }

        return Math.max(1000, next.getTime() - now.getTime());
    }

    function parseJsonArray(value) {
        if (Array.isArray(value)) {
            return value;
        }

        if (value == null || value === "") {
            return [];
        }

        try {
            const parsed = JSON.parse(value);
            return Array.isArray(parsed) ? parsed : [];
        } catch (e) {
            return [];
        }
    }

    function extractRowsFromPayload(payload) {
        if (!payload) return [];
        if (Array.isArray(payload.result)) return payload.result;
        if (Array.isArray(payload.data)) return payload.data;
        if (Array.isArray(payload)) return payload;
        return [];
    }

    function getCurrentActualIndex(actualData) {
        if (!Array.isArray(actualData)) {
            return -1;
        }

        for (let i = actualData.length - 1; i >= 0; i--) {
            const value = actualData[i];

            if (value !== null && value !== undefined && value !== "") {
                const numericValue = Number(value);

                if (Number.isFinite(numericValue)) {
                    return i;
                }
            }
        }

        return -1;
    }

    function getYAxisStep(rows) {
        if (!Array.isArray(rows) || !rows.length) {
            return DEFAULT_Y_AXIS_STEP;
        }

        for (const row of rows) {
            const step = normaliseInt(row.y_axis_step);

            if (step > 0) {
                return step;
            }
        }

        return DEFAULT_Y_AXIS_STEP;
    }

    function getMaxNumericValue(values) {
        if (!Array.isArray(values)) {
            return 0;
        }

        let maxValue = 0;

        values.forEach(function (value) {
            if (value === null || value === undefined || value === "") {
                return;
            }

            const numericValue = Number(value);

            if (Number.isFinite(numericValue) && numericValue > maxValue) {
                maxValue = numericValue;
            }
        });

        return maxValue;
    }

    function computeSharedYAxisMax(rows) {
        const yAxisStep = getYAxisStep(rows);
        let maxValue = 0;

        rows.forEach(function (row) {
            const targetData = parseJsonArray(row.mtd_target_data);
            const actualData = parseJsonArray(row.mtd_actual_data);

            maxValue = Math.max(
                maxValue,
                getMaxNumericValue(targetData),
                getMaxNumericValue(actualData),
                normaliseFloat(row.monthly_target_bcm)
            );
        });

        if (!maxValue || maxValue <= 0) {
            return yAxisStep;
        }

        return Math.ceil(maxValue / yAxisStep) * yAxisStep;
    }

    function buildChartConfig(labels, targetData, actualData, sharedYAxisMax, yAxisStep) {
        const currentActualIndex = getCurrentActualIndex(actualData);

        function actualPointColour(index) {
            const actual = Number(actualData[index]);
            const target = Number(targetData[index]);

            if (!Number.isFinite(actual)) {
                return ACTUAL_BELOW_TARGET_COLOR;
            }

            if (!Number.isFinite(target)) {
                return ACTUAL_ABOVE_TARGET_COLOR;
            }

            return actual >= target
                ? ACTUAL_ABOVE_TARGET_COLOR
                : ACTUAL_BELOW_TARGET_COLOR;
        }

        function actualSegmentColour(ctx) {
            const index = ctx.p1DataIndex;

            if (index == null) {
                return ACTUAL_BELOW_TARGET_COLOR;
            }

            return actualPointColour(index);
        }

        return {
            type: "line",
            data: {
                labels: labels,
                datasets: [
                    {
                        label: "MTD Target",
                        data: targetData,
                        borderColor: TARGET_LINE_COLOR,
                        backgroundColor: TARGET_LINE_COLOR,
                        pointBackgroundColor: TARGET_LINE_COLOR,
                        pointBorderColor: TARGET_LINE_COLOR,
                        borderWidth: 2,
                        tension: 0.25,
                        pointRadius: TARGET_POINT_RADIUS,
                        pointHoverRadius: TARGET_POINT_RADIUS + 2,
                        pointBorderWidth: 1
                    },
                    {
                        label: "MTD Actual",
                        data: actualData,
                        borderColor: ACTUAL_BELOW_TARGET_COLOR,
                        segment: {
                            borderColor: actualSegmentColour
                        },
                        backgroundColor: function (ctx) {
                            return actualPointColour(ctx.dataIndex);
                        },
                        pointBackgroundColor: function (ctx) {
                            if (ctx.dataIndex === currentActualIndex) {
                                return CURRENT_DATE_POINT_COLOR;
                            }

                            return actualPointColour(ctx.dataIndex);
                        },
                        pointBorderColor: function (ctx) {
                            if (ctx.dataIndex === currentActualIndex) {
                                return CURRENT_DATE_POINT_COLOR;
                            }

                            return actualPointColour(ctx.dataIndex);
                        },
                        pointRadius: function (ctx) {
                            return ctx.dataIndex === currentActualIndex
                                ? CURRENT_DATE_POINT_RADIUS
                                : ACTUAL_POINT_RADIUS;
                        },
                        pointHoverRadius: function (ctx) {
                            return ctx.dataIndex === currentActualIndex
                                ? CURRENT_DATE_POINT_RADIUS + 2
                                : ACTUAL_POINT_RADIUS + 2;
                        },
                        borderWidth: 2,
                        tension: 0.25,
                        pointBorderWidth: 1,
                        spanGaps: false
                    }
                ]
            },
            options: {
                animation: false,
                responsive: true,
                maintainAspectRatio: false,
                layout: {
                    padding: {
                        left: 32,
                        right: 12,
                        top: 10,
                        bottom: 10
                    }
                },
                plugins: {
                    legend: {
                        display: false
                    }
                },
                scales: {
                    x: {
                        ticks: {
                            autoSkip: true,
                            font: {
                                size: 11
                            }
                        }
                    },
                    y: {
                        beginAtZero: true,
                        max: sharedYAxisMax,
                        ticks: {
                            stepSize: yAxisStep,
                            font: {
                                size: 11
                            },
                            padding: 6
                        }
                    }
                }
            }
        };
    }

    function withTimeout(promise, timeoutMs, timeoutMessage) {
        let timeoutHandle = null;

        const timeoutPromise = new Promise(function (_resolve, reject) {
            timeoutHandle = setTimeout(function () {
                reject(new Error(timeoutMessage || "Request timed out."));
            }, timeoutMs);
        });

        return Promise.race([promise, timeoutPromise]).finally(function () {
            if (timeoutHandle) {
                clearTimeout(timeoutHandle);
            }
        });
    }

    function ensureChartJs() {
        if (window.Chart) {
            return Promise.resolve();
        }

        if (window._isd_chartjs_promise) {
            return withTimeout(
                window._isd_chartjs_promise,
                CHARTJS_TIMEOUT_MS,
                "Chart.js did not load in time."
            );
        }

        window._isd_chartjs_promise = new Promise(function (resolve, reject) {
            const existing = document.querySelector('script[data-isd-chartjs="1"]');

            if (existing) {
                existing.addEventListener("load", function () { resolve(); }, { once: true });
                existing.addEventListener("error", function () { reject(new Error("Chart.js failed to load")); }, { once: true });
                return;
            }

            const script = document.createElement("script");
            script.src = "https://cdn.jsdelivr.net/npm/chart.js";
            script.dataset.isdChartjs = "1";

            script.onload = function () {
                resolve();
            };

            script.onerror = function () {
                reject(new Error("Chart.js failed to load"));
            };

            document.head.appendChild(script);
        }).catch(function (e) {
            window._isd_chartjs_promise = null;

            const existing = document.querySelector('script[data-isd-chartjs="1"]');
            if (existing && existing.parentNode) {
                existing.parentNode.removeChild(existing);
            }

            throw e;
        });

        return withTimeout(
            window._isd_chartjs_promise,
            CHARTJS_TIMEOUT_MS,
            "Chart.js did not load in time."
        );
    }

    function destroyCharts() {
        _charts.forEach(function (chart) {
            try {
                chart.destroy();
            } catch (e) {
                // ignore stale chart instances
            }
        });

        _charts = [];
    }

    function renderCharts(chartConfigs) {
        if (!window.Chart) {
            throw new Error("Chart.js is not available.");
        }

        destroyCharts();

        dashEl.querySelectorAll("canvas[data-chart-index]").forEach(function (canvas) {
            const idx = parseInt(canvas.dataset.chartIndex, 10);
            const config = chartConfigs[idx];

            if (!config) {
                return;
            }

            try {
                const chart = new Chart(canvas.getContext("2d"), config);
                _charts.push(chart);

                setTimeout(function () { chart.resize(); }, 50);
                setTimeout(function () { chart.resize(); }, 150);
                setTimeout(function () { chart.resize(); }, 300);
            } catch (e) {
                console.error("Could not render site volume chart", e);
            }
        });
    }

    function getHeaderBackgroundStyle(site, siteColourMap) {
        const mappedColour = siteColourMap && siteColourMap[site]
            ? String(siteColourMap[site]).trim()
            : "";

        if (!mappedColour) {
            return "background:transparent;";
        }

        return "background:" + escapeHtml(mappedColour) + ";";
    }

    function buildSiteCard(row, siteColourMap, idx) {
        const site = String(row.site || "").trim();
        const prodStart = row.prod_start || "";
        const prodEnd = row.prod_end || "";
        const mtdUpto = row.mtd_upto || "";
        const headerBackground = getHeaderBackgroundStyle(site, siteColourMap);

        return (
            '<div class="isd-dashboard-card">' +
                '<div class="isd-dashboard-card-header" style="' + headerBackground + '">' +
                    '<div class="isd-dashboard-card-title">Site: ' + escapeHtml(site) + "</div>" +
                    '<div class="isd-dashboard-card-subtitle">' +
                        "Production Period: " + escapeHtml(prodStart) + " → " + escapeHtml(prodEnd) + "<br>" +
                        "MTD up to: " + escapeHtml(mtdUpto) +
                    "</div>" +
                "</div>" +

                '<div class="isd-dashboard-chart">' +
                    '<canvas data-chart-index="' + idx + '"></canvas>' +
                "</div>" +
            "</div>"
        );
    }

    function sortRows(rows, siteOrderMap) {
        return rows.slice().sort(function (a, b) {
            const aSite = String(a.site || "").trim();
            const bSite = String(b.site || "").trim();

            const aFallbackOrder = Object.prototype.hasOwnProperty.call(siteOrderMap, aSite)
                ? siteOrderMap[aSite]
                : 999999;

            const bFallbackOrder = Object.prototype.hasOwnProperty.call(siteOrderMap, bSite)
                ? siteOrderMap[bSite]
                : 999999;

            const aOrder = normaliseInt(a.site_order || aFallbackOrder);
            const bOrder = normaliseInt(b.site_order || bFallbackOrder);

            if (aOrder !== bOrder) {
                return aOrder - bOrder;
            }

            return aSite.localeCompare(bSite);
        });
    }

    function renderDashboard(response) {
        const payload = response.payload || {};
        const siteOrderMap = response.site_order_map || {};
        const siteColourMap = response.site_colour_map || {};
        const rows = extractRowsFromPayload(payload);

        destroyCharts();

        if (!rows.length) {
            dashEl.innerHTML = '<div class="text-muted">No graph data for the selected filter.</div>';
            return;
        }

        const sorted = sortRows(rows, siteOrderMap);
        const yAxisStep = getYAxisStep(sorted);
        const sharedYAxisMax = computeSharedYAxisMax(sorted);

        const chartConfigs = sorted.map(function (row) {
            const labels = parseJsonArray(row.chart_labels);
            const targetData = parseJsonArray(row.mtd_target_data);
            const actualData = parseJsonArray(row.mtd_actual_data);

            return buildChartConfig(
                labels,
                targetData,
                actualData,
                sharedYAxisMax,
                yAxisStep
            );
        });

        dashEl.innerHTML = sorted.map(function (row, idx) {
            return buildSiteCard(row, siteColourMap, idx);
        }).join("");

        renderCharts(chartConfigs);
    }

    function selectedValue() {
        return String(input.value || "").trim();
    }

    function clearExistingTimer() {
        if (_timer) {
            clearTimeout(_timer);
            _timer = null;
        }
    }

    function scheduleNextRefresh() {
        clearExistingTimer();

        if (!selectedValue()) {
            return;
        }

        _timer = setTimeout(function () {
            refreshForDueSlot("aligned-timer");
        }, msUntilNextRefresh());
    }

    function runReport(value) {
        return frappe.call({
            method: "is_production.templates.pages.portal_site_volume_graphs.run_portal_report",
            args: {
                monthly_production_plan: value,
                define_monthly_production: value,
                request_time: new Date().toISOString()
            },
            freeze: false
        });
    }

    function loadAndRender(isAuto, reason) {
        const val = selectedValue();

        if (!val) {
            statusEl.textContent = "Select a Define Monthly Production to load the graphs.";
            dashEl.innerHTML = "";
            return Promise.resolve(false);
        }

        if (_refreshing) {
            return Promise.resolve(false);
        }

        _refreshing = true;
        _requestSeq += 1;

        const thisRequestSeq = _requestSeq;

        localStorage.setItem(STORAGE_KEY, val);
        statusEl.textContent = isAuto ? "Refreshing..." : "Loading...";

        return withTimeout(
            runReport(val),
            AJAX_TIMEOUT_MS,
            "Report request timed out after " + Math.round(AJAX_TIMEOUT_MS / 1000) + " seconds."
        ).then(function (r) {
            if (thisRequestSeq !== _requestSeq) {
                return false;
            }

            statusEl.textContent = "Loading graphs...";

            return ensureChartJs().then(function () {
                if (thisRequestSeq !== _requestSeq) {
                    return false;
                }

                renderDashboard(r.message || {});

                const now = new Date();
                const time = formatTime(now);

                _lastSuccessAt = now.getTime();
                _lastLoadFailed = false;
                _lastSlotKeyRefreshed = slotKey(mostRecentRefreshSlot(now));

                statusEl.textContent = "Last updated: " + time + " (refreshes at :10 and :30)";

                if (isAuto && frappe.show_alert) {
                    frappe.show_alert({
                        message: "Site Volume Graphs updated at " + time,
                        indicator: "green"
                    }, 5);
                }

                return true;
            });
        }).catch(function (e) {
            if (thisRequestSeq !== _requestSeq) {
                return false;
            }

            console.error("Site Volume Graphs portal error:", e);
            _lastLoadFailed = true;

            let message = "Could not load graphs.";
            if (e && e.message) {
                message += " " + e.message;
            }

            statusEl.textContent = "Error loading Site Volume Graphs. Retrying automatically at :10 and :30.";
            dashEl.innerHTML = (
                '<div class="text-danger">' +
                    escapeHtml(message) +
                    " Check browser console and server logs." +
                '</div>'
            );

            return false;
        }).finally(function () {
            if (thisRequestSeq === _requestSeq) {
                _refreshing = false;
            }

            scheduleNextRefresh();
        });
    }

    function refreshForDueSlot(reason) {
        if (!selectedValue()) {
            return;
        }

        if (_refreshing) {
            return;
        }

        const now = new Date();
        const dueSlot = mostRecentRefreshSlot(now);
        const dueKey = slotKey(dueSlot);

        if (dueKey === _lastSlotKeyRefreshed && !_lastLoadFailed) {
            scheduleNextRefresh();
            return;
        }

        loadAndRender(true, reason);
    }

    function refreshAfterWake(reason) {
        if (!selectedValue()) {
            return;
        }

        if (_refreshing) {
            return;
        }

        const now = Date.now();

        if (_lastLoadFailed || !_lastSuccessAt || now - _lastSuccessAt >= WAKE_REFRESH_AFTER_MS) {
            loadAndRender(true, reason);
        } else {
            scheduleNextRefresh();
        }
    }

    function startRefreshEngine() {
        scheduleNextRefresh();

        if (!_watchdog) {
            _watchdog = setInterval(function () {
                refreshForDueSlot("watchdog");
            }, WATCHDOG_INTERVAL_MS);
        }
    }

    async function searchDefineMonthlyProduction(term) {
        const r = await frappe.call({
            method: "is_production.templates.pages.portal_site_volume_graphs.search_define_monthly_production",
            args: {
                txt: term || ""
            },
            freeze: false
        });

        return r.message || [];
    }

    async function renderDropdown() {
        const term = input.value || "";

        try {
            const results = await searchDefineMonthlyProduction(term);

            if (!results.length) {
                dropdown.innerHTML = '<div class="portal-empty">No matches found</div>';
                dropdown.style.display = "block";
                return;
            }

            dropdown.innerHTML = results.map(function (option) {
                return '<div class="portal-option" data-value="' + escapeHtml(option) + '">' + escapeHtml(option) + '</div>';
            }).join("");

            dropdown.style.display = "block";
        } catch (e) {
            console.error("Search failed:", e);
            dropdown.innerHTML = '<div class="portal-empty">No matches found</div>';
            dropdown.style.display = "block";
        }
    }

    input.addEventListener("focus", renderDropdown);
    input.addEventListener("input", renderDropdown);

    dropdown.addEventListener("mousedown", function (e) {
        const optionEl = e.target.closest(".portal-option");
        if (!optionEl) return;

        input.value = optionEl.getAttribute("data-value");
        dropdown.style.display = "none";

        _lastSuccessAt = 0;
        _lastSlotKeyRefreshed = "";
        _lastLoadFailed = false;

        loadAndRender(false, "manual-select");
        startRefreshEngine();
    });

    document.addEventListener("click", function (e) {
        const wrap = input.closest(".portal-filter");
        if (wrap && !wrap.contains(e.target)) {
            dropdown.style.display = "none";
        }
    });

    document.addEventListener("visibilitychange", function () {
        if (!document.hidden) {
            refreshAfterWake("visibilitychange");
        }
    });

    window.addEventListener("focus", function () {
        refreshAfterWake("focus");
    });

    window.addEventListener("pageshow", function () {
        refreshAfterWake("pageshow");
    });

    window.addEventListener("online", function () {
        refreshAfterWake("online");
    });

    window.addEventListener("beforeunload", function () {
        clearExistingTimer();

        if (_watchdog) {
            clearInterval(_watchdog);
            _watchdog = null;
        }

        destroyCharts();
    });

    const last = localStorage.getItem(STORAGE_KEY);

    if (last) {
        input.value = last;
        loadAndRender(false, "restore-selection");
        startRefreshEngine();
    } else {
        statusEl.textContent = "Select a Define Monthly Production to load the graphs.";
    }
})();
</script>
{% endblock %}

{% extends "templates/web.html" %}

{% block page_content %}
<style>
html,
body {
    background: #ffffff !important;
    overflow: hidden !important;
}

header,
footer,
.web-footer,
.navbar,
.page-breadcrumbs,
.page-header,
.page-footer,
.footer-powered {
    display: none !important;
}

.web-page,
.page_content,
.page-content,
.page-content-wrapper,
main,
.container,
.container-fluid {
    max-width: none !important;
    width: 100% !important;
    padding: 0 !important;
    margin: 0 !important;
}

#portal-hourly-dashboard-app {
    position: fixed;
    inset: 0;
    z-index: 9999;
    background: #ffffff;
    overflow: auto;
    padding: 18px;
    box-sizing: border-box;
    font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    color: #1f272e;
}

.portal-topbar {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 10px;
    padding: 0;
}

.portal-title {
    font-size: 16px;
    font-weight: 700;
    margin: 0;
    line-height: 32px;
    color: #111827;
    white-space: nowrap;
}

.portal-filter {
    width: 320px;
    position: relative;
}

.portal-filter input {
    width: 100%;
    height: 32px;
    border-radius: 8px;
    border: 1px solid #d1d8dd;
    padding: 4px 10px;
    background: #f7f7f7;
    color: #111827;
    font-size: 14px;
    outline: none;
}

.portal-filter input:focus {
    border-color: #9aa8b5;
    background: #ffffff;
}

.portal-dropdown {
    position: absolute;
    top: calc(100% + 4px);
    left: 0;
    right: 0;
    z-index: 10000;
    background: #fff;
    border: 1px solid #d1d8dd;
    border-radius: 8px;
    box-shadow: 0 6px 18px rgba(0,0,0,0.12);
    max-height: 260px;
    overflow-y: auto;
    display: none;
}

.portal-option {
    padding: 10px 12px;
    cursor: pointer;
    border-bottom: 1px solid #f3f3f3;
    font-size: 13px;
}

.portal-option:hover {
    background: #f7fafc;
}

.portal-empty {
    padding: 10px 12px;
    color: #6c757d;
    font-size: 13px;
}

#dashboard_status {
    margin: 0 0 10px 0;
    padding: 0;
    color: #6c757d;
    font-size: 14px;
}

#dashboard_content {
    width: 100%;
}

#dashboard_content .isd-dashboard-grid {
    display: block;
    width: 100%;
    max-width: none;
    margin: 0;
    padding: 0;
}

#dashboard_content .isd-dashboard-card {
    width: 100%;
    border: 1px solid #d8dfe6;
    border-radius: 8px;
    overflow: hidden;
    margin: 0 0 10px 0;
    background: #ffffff;
    box-shadow: none;
}

#dashboard_content .isd-dashboard-card-header {
    padding: 10px 12px;
    font-weight: 700;
    font-size: 13px;
    line-height: 1.25;
    color: #111827;
}

#dashboard_content .isd-dashboard-card-title {
    display: block;
    font-weight: 700;
    font-size: 13px;
}

#dashboard_content .isd-dashboard-card-subtitle {
    display: block;
    font-weight: 400;
    font-size: 12px;
    margin-top: 5px;
}

#dashboard_content .isd-dashboard-table-wrap {
    width: 100%;
    overflow-x: auto;
}

#dashboard_content .isd-dashboard-table,
#dashboard_content table {
    width: 100% !important;
    max-width: none !important;
    border-collapse: collapse !important;
    table-layout: fixed !important;
    background: #ffffff !important;
    margin: 0 !important;
    font-size: 11px;
}

#dashboard_content .isd-dashboard-th,
#dashboard_content .isd-dashboard-td,
#dashboard_content th,
#dashboard_content td {
    border: 1px solid #e0e0e0 !important;
    padding: 4px 4px !important;
    text-align: center !important;
    vertical-align: middle !important;
    font-size: 11px !important;
    line-height: 1.05 !important;
    min-height: 28px;
    height: 28px;
    background-clip: padding-box;
    overflow: hidden;
    white-space: normal;
}

#dashboard_content .isd-dashboard-th,
#dashboard_content th {
    background: #ffffff !important;
    font-weight: 700;
    color: #111827;
}

#dashboard_content .isd-dashboard-td,
#dashboard_content td {
    background: #ffffff !important;
    color: #1f272e;
}

#dashboard_content .isd-dashboard-th:first-child,
#dashboard_content .isd-dashboard-td:first-child,
#dashboard_content th:first-child,
#dashboard_content td:first-child {
    width: 230px !important;
    min-width: 230px !important;
    max-width: 230px !important;
    text-align: left !important;
    font-weight: 700;
    padding-left: 10px !important;
    background: #ffffff !important;
}

#dashboard_content .isd-dashboard-td:empty::after,
#dashboard_content td:empty::after {
    content: "\00a0";
}

#dashboard_content .isd-dashboard-cell-low {
    background: #f3d6d8 !important;
}

#dashboard_content .isd-dashboard-cell-medium {
    background: #f5e4d5 !important;
}

#dashboard_content .isd-dashboard-cell-high {
    background: #d8efe5 !important;
}

#dashboard_content .isd-dashboard-excavator {
    background: #ffffff !important;
}

@media (max-width: 900px) {
    #portal-hourly-dashboard-app {
        padding: 8px;
    }

    .portal-topbar {
        align-items: flex-start;
        flex-direction: column;
        gap: 6px;
    }

    .portal-filter {
        width: 100%;
    }

    #dashboard_content .isd-dashboard-th:first-child,
    #dashboard_content .isd-dashboard-td:first-child,
    #dashboard_content th:first-child,
    #dashboard_content td:first-child {
        width: 160px !important;
        min-width: 160px !important;
        max-width: 160px !important;
    }

    #dashboard_content .isd-dashboard-table,
    #dashboard_content table {
        min-width: 1200px;
    }
}
</style>

<div id="portal-hourly-dashboard-app">
    <div class="portal-topbar">
        <h1 class="portal-title">Hourly Dashboard</h1>

        <div class="portal-filter">
            <input
                type="text"
                id="define_monthly_production"
                placeholder="Search Define Monthly Production"
                autocomplete="off"
            >
            <div id="define_monthly_production_dropdown" class="portal-dropdown"></div>
        </div>
    </div>

    <div id="dashboard_status">Select a Define Monthly Production to load the dashboard.</div>
    <div id="dashboard_content" class="isd-dashboard-grid"></div>
</div>

<script>
(function () {
    "use strict";

    const STORAGE_KEY = "portal_hourly_dash_define_monthly_production";
    const WATCHDOG_INTERVAL_MS = 60 * 1000;
    const WAKE_REFRESH_AFTER_MS = 2 * 60 * 1000;

    const SLOT_LABELS = [
        "06-07", "07-08", "08-09", "09-10", "10-11", "11-12", "12-13",
        "13-14", "14-15", "15-16", "16-17", "17-18",
        "18-19", "19-20", "20-21", "21-22", "22-23", "23-24",
        "24-01", "01-02", "03-04", "04-05", "05-06"
    ];

    /*
        IMPORTANT:
        Correct full 24-hour list below. The small correction keeps the same
        display as the original dashboard and includes 02-03.
    */
    const FULL_SLOT_LABELS = [
        "06-07", "07-08", "08-09", "09-10", "10-11", "11-12", "12-13",
        "13-14", "14-15", "15-16", "16-17", "17-18",
        "18-19", "19-20", "20-21", "21-22", "22-23", "23-24",
        "24-01", "01-02", "02-03", "03-04", "04-05", "05-06"
    ];

    const input = document.getElementById("define_monthly_production");
    const dropdown = document.getElementById("define_monthly_production_dropdown");
    const statusEl = document.getElementById("dashboard_status");
    const dashEl = document.getElementById("dashboard_content");

    let _refreshing = false;
    let _timer = null;
    let _watchdog = null;
    let _lastSuccessAt = 0;
    let _lastSlotKeyRefreshed = "";
    let _lastLoadFailed = false;

    function escapeHtml(value) {
        return String(value == null ? "" : value)
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;")
            .replace(/'/g, "&#39;");
    }

    function slotField(slotNumber) {
        return "slot_" + String(slotNumber).padStart(2, "0");
    }

    function normaliseInt(value) {
        const parsed = parseInt(value, 10);
        return Number.isFinite(parsed) ? parsed : 0;
    }

    function formatTime(date) {
        return date.toLocaleTimeString([], {
            hour: "2-digit",
            minute: "2-digit"
        });
    }

    function pad2(value) {
        return String(value).padStart(2, "0");
    }

    function slotKey(date) {
        return (
            date.getFullYear() + "-" +
            pad2(date.getMonth() + 1) + "-" +
            pad2(date.getDate()) + " " +
            pad2(date.getHours()) + ":" +
            pad2(date.getMinutes())
        );
    }

    function mostRecentRefreshSlot(now) {
        const slot = new Date(now.getTime());
        slot.setSeconds(0, 0);

        const minutes = slot.getMinutes();

        if (minutes >= 30) {
            slot.setMinutes(30);
        } else if (minutes >= 10) {
            slot.setMinutes(10);
        } else {
            slot.setHours(slot.getHours() - 1);
            slot.setMinutes(30);
        }

        return slot;
    }

    function msUntilNextRefresh() {
        const now = new Date();
        const next = new Date(now.getTime());
        next.setSeconds(0, 0);

        const minutes = now.getMinutes();

        if (minutes < 10) {
            next.setMinutes(10);
        } else if (minutes < 30) {
            next.setMinutes(30);
        } else {
            next.setHours(next.getHours() + 1);
            next.setMinutes(10);
        }

        return Math.max(1000, next.getTime() - now.getTime());
    }

    function getCellDisplay(value) {
        value = normaliseInt(value);

        if (value === 0) {
            return { css_class: "", display: "", title: "" };
        }

        if (value >= 1 && value <= 199) {
            return { css_class: "isd-dashboard-cell-low", display: String(value), title: value + " bcm" };
        }

        if (value >= 200 && value <= 219) {
            return { css_class: "isd-dashboard-cell-medium", display: String(value), title: value + " bcm" };
        }

        return { css_class: "isd-dashboard-cell-high", display: String(value), title: value + " bcm" };
    }

    function extractRowsFromPayload(payload) {
        if (!payload) return [];
        if (Array.isArray(payload.result)) return payload.result;
        if (Array.isArray(payload.data)) return payload.data;
        if (Array.isArray(payload)) return payload;
        return [];
    }

    function groupRowsBySite(rows, siteOrderMap) {
        const siteMap = new Map();

        rows.forEach(function (row) {
            const site = String(row.site || "").trim();
            if (!site) return;

            if (!siteMap.has(site)) {
                const fallbackOrder = Object.prototype.hasOwnProperty.call(siteOrderMap, site)
                    ? siteOrderMap[site]
                    : 999999;

                siteMap.set(site, {
                    site: site,
                    site_order: normaliseInt(row.site_order || fallbackOrder),
                    production_day: row.production_day || "",
                    rows: []
                });
            }

            const group = siteMap.get(site);

            if (!group.production_day && row.production_day) {
                group.production_day = row.production_day;
            }

            if (!row.is_empty_site) {
                group.rows.push(row);
            }
        });

        return Array.from(siteMap.values()).sort(function (a, b) {
            if (a.site_order !== b.site_order) return a.site_order - b.site_order;
            return a.site.localeCompare(b.site);
        });
    }

    function getHeaderBackgroundStyle(site, siteColourMap) {
        const mappedColour = siteColourMap && siteColourMap[site]
            ? String(siteColourMap[site]).trim()
            : "";

        if (!mappedColour) return "background:transparent;";
        return "background:" + escapeHtml(mappedColour) + ";";
    }

    function renderHourHeader() {
        const hourHeaders = FULL_SLOT_LABELS.map(function (label) {
            const escapedLabel = escapeHtml(label);
            const displayLabel = escapedLabel.replace("-", "<br>");
            return '<th class="isd-dashboard-th" title="' + escapedLabel + '">' + displayLabel + '</th>';
        }).join("");

        return "<tr>" + '<th class="isd-dashboard-th">Excavator</th>' + hourHeaders + "</tr>";
    }

    function renderExcavatorRow(row) {
        const excavator = escapeHtml(row.excavator || "");
        const cells = [
            '<td class="isd-dashboard-td isd-dashboard-excavator" title="' + excavator + '">' + excavator + "</td>"
        ];

        for (let slot = 1; slot <= 24; slot++) {
            const value = normaliseInt(row[slotField(slot)]);
            const cell = getCellDisplay(value);
            const titleAttr = cell.title ? ' title="' + escapeHtml(cell.title) + '"' : "";
            const cssClass = cell.css_class ? " " + cell.css_class : "";

            cells.push(
                '<td class="isd-dashboard-td' + cssClass + '"' + titleAttr + ">" +
                    escapeHtml(cell.display) +
                "</td>"
            );
        }

        return "<tr>" + cells.join("") + "</tr>";
    }

    function renderSiteBlock(group, siteColourMap) {
        const rowsHtml = group.rows.map(renderExcavatorRow).join("");
        const headerBackground = getHeaderBackgroundStyle(group.site, siteColourMap);

        return (
            '<div class="isd-dashboard-card">' +
                '<div class="isd-dashboard-card-header" style="' + headerBackground + '">' +
                    '<div class="isd-dashboard-card-title">Site: ' + escapeHtml(group.site) + "</div>" +
                    '<div class="isd-dashboard-card-subtitle">' +
                        "Production Day: " + escapeHtml(group.production_day) +
                    "</div>" +
                "</div>" +
                '<div class="isd-dashboard-table-wrap">' +
                    '<table class="isd-dashboard-table isd-dashboard-table--hourly">' +
                        renderHourHeader() + rowsHtml +
                    "</table>" +
                "</div>" +
            "</div>"
        );
    }

    function renderDashboard(response) {
        const payload = response.payload || {};
        const siteOrderMap = response.site_order_map || {};
        const siteColourMap = response.site_colour_map || {};
        const rows = extractRowsFromPayload(payload);

        if (!rows.length) {
            dashEl.innerHTML = '<div class="text-muted">No data for the selected filter.</div>';
            return;
        }

        const groupedSites = groupRowsBySite(rows, siteOrderMap);

        if (!groupedSites.length) {
            dashEl.innerHTML = '<div class="text-muted">No sites found for the selected filter.</div>';
            return;
        }

        dashEl.innerHTML = groupedSites.map(function (group) {
            return renderSiteBlock(group, siteColourMap);
        }).join("");
    }

    function runReport(value) {
        return frappe.call({
            method: "is_production.templates.pages.portal_hourly_dashboard.run_portal_report",
            args: {
                define_monthly_production: value,
                request_time: new Date().toISOString()
            },
            freeze: false
        });
    }

    function selectedValue() {
        return String(input.value || "").trim();
    }

    function loadAndRender(isAuto, reason) {
        const val = selectedValue();

        if (!val) {
            statusEl.textContent = "Select a Define Monthly Production to load the dashboard.";
            dashEl.innerHTML = "";
            return Promise.resolve(false);
        }

        if (_refreshing) {
            return Promise.resolve(false);
        }

        _refreshing = true;
        localStorage.setItem(STORAGE_KEY, val);
        statusEl.textContent = isAuto ? "Refreshing..." : "Loading...";

        return runReport(val).then(function (r) {
            renderDashboard(r.message || {});

            const now = new Date();
            const time = formatTime(now);
            _lastSuccessAt = now.getTime();
            _lastLoadFailed = false;

            const recentSlot = mostRecentRefreshSlot(now);
            _lastSlotKeyRefreshed = slotKey(recentSlot);

            statusEl.textContent = "Last updated: " + time + " (refreshes at :10 and :30)";

            if (isAuto && frappe.show_alert) {
                frappe.show_alert({
                    message: "Hourly Dashboard updated at " + time,
                    indicator: "green"
                }, 5);
            }

            return true;
        }).catch(function (e) {
            console.error("Hourly Dashboard portal error:", e);
            _lastLoadFailed = true;

            let message = "Could not load dashboard data.";
            if (e && e.message) {
                message += " " + e.message;
            }

            statusEl.textContent = "Error loading dashboard data. Retrying automatically at :10 and :30.";
            dashEl.innerHTML = '<div class="text-danger">' + escapeHtml(message) + " Check browser console and server logs.</div>";
            return false;
        }).finally(function () {
            _refreshing = false;
            scheduleNextRefresh();
        });
    }

    function clearExistingTimer() {
        if (_timer) {
            clearTimeout(_timer);
            _timer = null;
        }
    }

    function scheduleNextRefresh() {
        clearExistingTimer();

        if (!selectedValue()) return;

        _timer = setTimeout(function () {
            refreshForDueSlot("aligned-timer");
        }, msUntilNextRefresh());
    }

    function refreshForDueSlot(reason) {
        if (!selectedValue() || _refreshing) return;

        const now = new Date();
        const dueSlot = mostRecentRefreshSlot(now);
        const dueKey = slotKey(dueSlot);

        if (dueKey === _lastSlotKeyRefreshed && !_lastLoadFailed) {
            scheduleNextRefresh();
            return;
        }

        loadAndRender(true, reason);
    }

    function refreshAfterWake(reason) {
        if (!selectedValue() || _refreshing) return;

        const now = Date.now();
        if (_lastLoadFailed || !_lastSuccessAt || now - _lastSuccessAt >= WAKE_REFRESH_AFTER_MS) {
            loadAndRender(true, reason);
        } else {
            scheduleNextRefresh();
        }
    }

    function startRefreshEngine() {
        scheduleNextRefresh();

        if (!_watchdog) {
            _watchdog = setInterval(function () {
                refreshForDueSlot("watchdog");
            }, WATCHDOG_INTERVAL_MS);
        }
    }

    async function searchDefineMonthlyProduction(term) {
        const r = await frappe.call({
            method: "is_production.templates.pages.portal_hourly_dashboard.search_define_monthly_production",
            args: { txt: term || "" },
            freeze: false
        });

        return r.message || [];
    }

    async function renderDropdown() {
        const term = input.value || "";

        try {
            const results = await searchDefineMonthlyProduction(term);

            if (!results.length) {
                dropdown.innerHTML = '<div class="portal-empty">No matches found</div>';
                dropdown.style.display = "block";
                return;
            }

            dropdown.innerHTML = results.map(function (option) {
                return '<div class="portal-option" data-value="' + escapeHtml(option) + '">' + escapeHtml(option) + '</div>';
            }).join("");

            dropdown.style.display = "block";
        } catch (e) {
            console.error("Search failed:", e);
            dropdown.innerHTML = '<div class="portal-empty">No matches found</div>';
            dropdown.style.display = "block";
        }
    }

    input.addEventListener("focus", renderDropdown);
    input.addEventListener("input", renderDropdown);

    dropdown.addEventListener("mousedown", function (e) {
        const optionEl = e.target.closest(".portal-option");
        if (!optionEl) return;

        input.value = optionEl.getAttribute("data-value");
        dropdown.style.display = "none";
        _lastSuccessAt = 0;
        _lastSlotKeyRefreshed = "";
        _lastLoadFailed = false;

        loadAndRender(false, "manual-select");
        startRefreshEngine();
    });

    document.addEventListener("click", function (e) {
        const wrap = input.closest(".portal-filter");
        if (wrap && !wrap.contains(e.target)) {
            dropdown.style.display = "none";
        }
    });

    document.addEventListener("visibilitychange", function () {
        if (!document.hidden) {
            refreshAfterWake("visibilitychange");
        }
    });

    window.addEventListener("focus", function () {
        refreshAfterWake("focus");
    });

    window.addEventListener("pageshow", function () {
        refreshAfterWake("pageshow");
    });

    window.addEventListener("online", function () {
        refreshAfterWake("online");
    });

    window.addEventListener("beforeunload", function () {
        clearExistingTimer();
        if (_watchdog) {
            clearInterval(_watchdog);
            _watchdog = null;
        }
    });

    const last = localStorage.getItem(STORAGE_KEY);
    if (last) {
        input.value = last;
        loadAndRender(false, "restore-selection");
        startRefreshEngine();
    } else {
        statusEl.textContent = "Select a Define Monthly Production to load the dashboard.";
    }
})();
</script>
{% endblock %}

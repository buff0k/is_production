{% extends "templates/web.html" %}

{% block page_content %}
<style>
/* =========================================================
   FULL SCREEN PORTAL APP SHELL
   ========================================================= */

html,
body {
    background: #ffffff !important;
    overflow: hidden !important;
}

header,
footer,
.web-footer,
.navbar,
.page-breadcrumbs,
.page-header,
.page-footer,
.footer-powered {
    display: none !important;
}

.web-page,
.page_content,
.page-content,
.page-content-wrapper,
main,
.container,
.container-fluid {
    max-width: none !important;
    width: 100% !important;
    padding: 0 !important;
    margin: 0 !important;
}

#portal-site-volume-tracking-app {
    position: fixed;
    inset: 0;
    z-index: 9999;
    background: #ffffff;
    overflow: auto;
    padding: 4px;
    font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    color: #1f272e;
}

/* =========================================================
   TOP BAR
   ========================================================= */

.portal-topbar {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 8px;
    padding: 0 4px;
}

.portal-title {
    font-size: 16px;
    font-weight: 700;
    margin: 0;
    line-height: 32px;
    color: #111827;
    white-space: nowrap;
}

.portal-filter {
    width: 320px;
    position: relative;
}

.portal-filter input {
    width: 100%;
    height: 32px;
    border-radius: 8px;
    border: 1px solid #d1d8dd;
    padding: 4px 10px;
    background: #f7f7f7;
    color: #111827;
    font-size: 14px;
    outline: none;
}

.portal-filter input:focus {
    border-color: #9aa8b5;
    background: #ffffff;
}

.portal-dropdown {
    position: absolute;
    top: calc(100% + 4px);
    left: 0;
    right: 0;
    z-index: 10000;
    background: #fff;
    border: 1px solid #d1d8dd;
    border-radius: 8px;
    box-shadow: 0 6px 18px rgba(0,0,0,0.12);
    max-height: 260px;
    overflow-y: auto;
    display: none;
}

.portal-option {
    padding: 10px 12px;
    cursor: pointer;
    border-bottom: 1px solid #f3f3f3;
    font-size: 13px;
}

.portal-option:hover {
    background: #f7fafc;
}

.portal-empty {
    padding: 10px 12px;
    color: #6c757d;
    font-size: 13px;
}

#dashboard_status {
    margin: 0 0 8px 0;
    padding: 0 4px;
    color: #6c757d;
    font-size: 14px;
}

#dashboard_content {
    width: 100%;
}

/* =========================================================
   DESK-LIKE SITE CARD
   ========================================================= */

.site-section {
    border: 2px solid #000000;
    border-radius: 8px;
    margin: 0 0 10px 0;
    overflow: hidden;
    background: #ffffff;
}

.site-header-block {
    padding: 8px;
}

.site-title {
    font-size: 18px;
    font-weight: 400;
    line-height: 1.2;
    margin-bottom: 3px;
    color: #1f272e;
}

.site-period {
    font-size: 12px;
    font-weight: 400;
    line-height: 1.2;
    color: #1f272e;
    text-transform: uppercase;
}

/* =========================================================
   KPI CARDS - MATCH DESK VERSION
   ========================================================= */

.kpi-bar {
    display: grid;
    grid-template-columns: 130px 130px 174px 130px 130px 132px 150px 130px;
    gap: 7px;
    margin-top: 8px;
    align-items: stretch;
}

.kpi-box {
    background: #f4f4f4;
    border: 3px solid #000000;
    border-radius: 8px;
    padding: 6px 6px 5px 6px;
    min-height: 62px;
    text-align: center;
    color: #1f272e;
    box-sizing: border-box;
}

.kpi-box .label {
    font-size: 11px;
    line-height: 1.05;
    font-weight: 700;
    margin-bottom: 4px;
}

.kpi-box .sub-label {
    font-size: 11px;
    line-height: 1.05;
    margin-top: 1px;
}

.kpi-box .value {
    font-size: 18px;
    font-weight: 800;
    line-height: 1.15;
    margin-top: 6px;
}

.kpi-box .trend {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 4px;
}

.kpi-box .arrow {
    font-size: 18px;
    line-height: 1;
}

.kpi-box.isd-good {
    background: #2fb34a !important;
    color: #ffffff !important;
}

.kpi-box.isd-bad {
    background: #e84f53 !important;
    color: #ffffff !important;
}

.kpi-box.projected-box {
    background: #d9f0ff !important;
    color: #000000 !important;
}

.kpi-box.projected-box .label {
    color: #000000 !important;
}

.kpi-box.projected-box .sub-label {
    color: #000000 !important;
}

.kpi-box.projected-box .value {
    color: #000000 !important;
}

/* =========================================================
   SUMMARY TABLE - MATCH DESK VERSION
   ========================================================= */

.summary-wrap {
    padding: 6px;
    background: #ffffff;
}

.summary-table {
    width: 100%;
    border-collapse: collapse;
    border: 4px solid #000000;
    background: #ffffff;
    table-layout: auto;
}

.summary-table th,
.summary-table td {
    border: 1px solid #000000;
    padding: 6px 6px;
    text-align: center;
    vertical-align: middle;
    font-size: 14px;
    line-height: 1.15;
    color: #1f272e;
    background: #ffffff;
    white-space: nowrap;
}

.summary-table th {
    font-weight: 800;
}

.summary-table td {
    font-weight: 400;
}

.summary-table .sep {
    border-right: 3px solid #000000 !important;
}

.summary-table .subsep {
    border-right: 1px solid #000000 !important;
}

.summary-table .isd-good-cell {
    background: #c9f2d8 !important;
}

.summary-table .isd-bad-cell {
    background: #f9caca !important;
}

/* =========================================================
   RESPONSIVE
   ========================================================= */

@media (max-width: 1400px) {
    .kpi-bar {
        grid-template-columns: repeat(4, minmax(130px, 1fr));
    }
}

@media (max-width: 800px) {
    .portal-topbar {
        flex-direction: column;
        align-items: flex-start;
        gap: 6px;
    }

    .portal-filter {
        width: 100%;
    }

    .kpi-bar {
        grid-template-columns: repeat(2, minmax(130px, 1fr));
    }

    .summary-wrap {
        overflow-x: auto;
    }

    .summary-table {
        min-width: 1300px;
    }
}
</style>

<div id="portal-site-volume-tracking-app">
    <div class="portal-topbar">
        <h1 class="portal-title">Site Volume Tracking</h1>

        <div class="portal-filter">
            <input
                type="text"
                id="define_monthly_production"
                placeholder="Search Define Monthly Production"
                autocomplete="off"
            >
            <div id="define_monthly_production_dropdown" class="portal-dropdown"></div>
        </div>
    </div>

    <div id="dashboard_status">Select a Define Monthly Production to load the dashboard.</div>
    <div id="dashboard_content" class="dashboard-grid"></div>
</div>

<script>
(function () {
    const STORAGE_KEY = "portal_site_volume_tracking_define_monthly_production";

    const SITE_HEADER_COLOURS = {
        "Klipfontein": "#EBF9FF",
        "Gwab": "#f7d8ff",
        "Kriel Rehabilitation": "#E6D3B1",
        "Koppie": "#feff8d",
        "Uitgevallen": "#ffd37f",
        "Bankfontein": "#e3e3e3"
    };

    const input = document.getElementById("define_monthly_production");
    const dropdown = document.getElementById("define_monthly_production_dropdown");
    const statusEl = document.getElementById("dashboard_status");
    const dashEl = document.getElementById("dashboard_content");

    let _auto_refresh_started = false;
    let _refreshing = false;
    let _timer = null;

    function escapeHtml(value) {
        return String(value == null ? "" : value)
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;")
            .replace(/'/g, "&#39;");
    }

    function ms_until_next_refresh() {
        const now = new Date();
        const minutes = now.getMinutes();
        const seconds = now.getSeconds();
        const ms = now.getMilliseconds();

        let nextMinute;
        if (minutes < 10) nextMinute = 10;
        else if (minutes < 30) nextMinute = 30;
        else nextMinute = 70;

        return (nextMinute - minutes) * 60 * 1000 - seconds * 1000 - ms;
    }

    function start_aligned_refresh() {
        if (_auto_refresh_started) return;
        _auto_refresh_started = true;

        const schedule_next = function () {
            const delay = ms_until_next_refresh();
            _timer = setTimeout(auto_refresh, delay);
        };

        const auto_refresh = function () {
            if (_refreshing) {
                schedule_next();
                return;
            }

            if (!input.value) {
                schedule_next();
                return;
            }

            _refreshing = true;
            load_and_render(true).finally(function () {
                _refreshing = false;
                schedule_next();
            });
        };

        schedule_next();
    }

    function fmt_int(n) {
        const x = Number(n || 0);
        return Math.round(x).toLocaleString().replace(/,/g, " ");
    }

    function fmt_decimal(n, decimals) {
        decimals = decimals == null ? 1 : decimals;
        const x = Number(n || 0);
        return x.toLocaleString(undefined, {
            minimumFractionDigits: decimals,
            maximumFractionDigits: decimals
        }).replace(/,/g, " ");
    }

    function cls_good_bad_from_value(val) {
        const v = Number(val || 0);
        return v >= 0 ? "isd-good" : "isd-bad";
    }

    function arrow_up_down(val) {
        const v = Number(val || 0);
        return v >= 0 ? "▲" : "▼";
    }

    function kpi_box(label, value, opts) {
        opts = opts || {};

        const coloured = !!opts.coloured;
        const showArrow = !!opts.showArrow;
        const sublabel = opts.sublabel || "";
        const formatter = typeof opts.formatter === "function" ? opts.formatter : fmt_int;

        let extraCls = "";
        let arrow = "";
        let projectedCls = "";
        let inlineStyle = "";

        if (opts.projected) {
            projectedCls = "projected-box";
        }

        if (opts.customBackground) {
            inlineStyle += "background:" + opts.customBackground + ";";
        }

        if (opts.customTextColor) {
            inlineStyle += "color:" + opts.customTextColor + ";";
        }

        if (coloured) {
            extraCls = cls_good_bad_from_value(value);
            if (showArrow) arrow = arrow_up_down(value);
        }

        return `
            <div class="kpi-box ${extraCls} ${projectedCls}" style="${inlineStyle}">
                <div class="label">${escapeHtml(label)}</div>
                ${
                    sublabel
                        ? `<div class="sub-label">${escapeHtml(sublabel)}</div>`
                        : `<div class="sub-label">&nbsp;</div>`
                }
                <div class="value">
                    <span class="trend">
                        ${arrow ? `<span class="arrow">${arrow}</span>` : ""}
                        <span>${formatter(value)}</span>
                    </span>
                </div>
            </div>
        `;
    }

    function kpi_required_vs_original(label, required, original) {
        const req = Number(required || 0);
        const orig = Number(original || 0);

        const good = req <= orig;
        const cls = good ? "isd-good" : "isd-bad";
        const arrow = good ? "▲" : "▼";

        return `
            <div class="kpi-box ${cls}">
                <div class="label">${escapeHtml(label)}</div>
                <div class="sub-label">&nbsp;</div>
                <div class="value">
                    <span class="trend">
                        <span class="arrow">${arrow}</span>
                        <span>${fmt_int(req)}</span>
                    </span>
                </div>
            </div>
        `;
    }

    function th(text, cls) {
        cls = cls || "";
        return `<th class="${cls}">${escapeHtml(text)}</th>`;
    }

    function td(value, opts) {
        opts = opts || {};

        const cls = opts.cls || "";
        const bgClass = opts.goodBadClass || "";

        return `<td class="${cls} ${bgClass}">${fmt_int(value)}</td>`;
    }

    function build_summary_table(r) {
        const mtd_var = Number(r.mtd_var_bcm || 0);
        const coal_var = Number(r.mtd_coal_var_t || 0);
        const waste_var = Number(r.mtd_waste_var_bcm || 0);
        const day_var = Number(r.day_var_bcm || 0);

        const mtdVarCls = mtd_var >= 0 ? "isd-good-cell" : "isd-bad-cell";
        const coalVarCls = coal_var >= 0 ? "isd-good-cell" : "isd-bad-cell";
        const wasteVarCls = waste_var >= 0 ? "isd-good-cell" : "isd-bad-cell";
        const dayVarCls = day_var >= 0 ? "isd-good-cell" : "isd-bad-cell";

        return `
            <table class="summary-table">
                <tr>
                    ${th("Month Target(bcm)", "subsep")}
                    ${th("Month Coal(t)", "subsep")}
                    ${th("Month Waste(bcm)", "sep")}

                    ${th("MTD Act(bcm)", "subsep")}
                    ${th("MTD Plan(bcm)", "subsep")}
                    ${th("Var", "sep")}

                    ${th("MTD C (t)", "subsep")}
                    ${th("MTD C Plan(t)", "subsep")}
                    ${th("Var C", "sep")}

                    ${th("MTD W (bcm)", "subsep")}
                    ${th("MTD W Plan(bcm)", "subsep")}
                    ${th("Var W", "sep")}

                    ${th("Day BCM", "subsep")}
                    ${th("Day Target(bcm)", "subsep")}
                    ${th("Day Var", "sep")}
                </tr>
                <tr>
                    ${td(r.month_target_bcm, { cls: "subsep" })}
                    ${td(r.month_coal_t, { cls: "subsep" })}
                    ${td(r.month_waste_bcm, { cls: "sep" })}

                    ${td(r.mtd_act_bcm, { cls: "subsep" })}
                    ${td(r.mtd_plan_bcm, { cls: "subsep" })}
                    ${td(r.mtd_var_bcm, { cls: "sep", goodBadClass: mtdVarCls })}

                    ${td(r.mtd_coal_t, { cls: "subsep" })}
                    ${td(r.mtd_coal_plan_t, { cls: "subsep" })}
                    ${td(r.mtd_coal_var_t, { cls: "sep", goodBadClass: coalVarCls })}

                    ${td(r.mtd_waste_bcm, { cls: "subsep" })}
                    ${td(r.mtd_waste_plan_bcm, { cls: "subsep" })}
                    ${td(r.mtd_waste_var_bcm, { cls: "sep", goodBadClass: wasteVarCls })}

                    ${td(r.day_bcm, { cls: "subsep" })}
                    ${td(r.day_target_bcm, { cls: "subsep" })}
                    ${td(r.day_var_bcm, { cls: "sep", goodBadClass: dayVarCls })}
                </tr>
            </table>
        `;
    }

    function build_site_card(r) {
        const site = (r.site || "").trim();
        const start = r.prod_start ? frappe.datetime.str_to_user(r.prod_start) : "";
        const end = r.prod_end ? frappe.datetime.str_to_user(r.prod_end) : "";
        const bg = SITE_HEADER_COLOURS[site] || r.site_colour || "#EEF4FB";

        const forecast_var = Number(r.forecast_var || 0);
        const employeeLabel = "Employees: " + fmt_int(r.employee_count || 0);

        return `
            <div class="site-section">
                <div class="site-header-block" style="background:${bg};">
                    <div class="site-title">SITE: ${escapeHtml(site)}</div>
                    <div class="site-period">
                        PRODUCTION PERIOD: ${escapeHtml(start)} → ${escapeHtml(end)}
                    </div>

                    <div class="kpi-bar">
                        ${kpi_box("Month Target", r.month_target_bcm)}
                        ${kpi_box("Forecast", r.forecast_bcm)}
                        ${kpi_box("Var: Forecast vs.Month Target", forecast_var, {
                            coloured: true,
                            showArrow: true
                        })}
                        ${kpi_box("Days Left in Month", r.days_left)}
                        ${kpi_box("Original Daily Target", r.original_daily_target)}
                        ${kpi_box("Current Avg per Day", r.current_avg_per_day)}
                        ${kpi_required_vs_original("Required Daily for Target", r.required_daily, r.original_daily_target)}
                        ${kpi_box("Projected BCM/man", r.projected_bcm_per_man, {
                            sublabel: employeeLabel,
                            formatter: function (v) { return fmt_decimal(v, 1); },
                            projected: true
                        })}
                    </div>
                </div>

                <div class="summary-wrap">
                    ${build_summary_table(r)}
                </div>
            </div>
        `;
    }

    function render_dashboard(response) {
        const rows = response.rows || [];
        const siteOrderMap = response.site_order_map || {};

        if (!rows.length) {
            dashEl.innerHTML = '<div class="text-muted">No data for the selected filter.</div>';
            return;
        }

        const sorted = [].concat(rows).sort(function (a, b) {
            const aSite = String(a.site || "").trim();
            const bSite = String(b.site || "").trim();

            const aHasOrder = Object.prototype.hasOwnProperty.call(siteOrderMap, aSite);
            const bHasOrder = Object.prototype.hasOwnProperty.call(siteOrderMap, bSite);

            if (aHasOrder && bHasOrder) return siteOrderMap[aSite] - siteOrderMap[bSite];
            if (aHasOrder) return -1;
            if (bHasOrder) return 1;

            return aSite.localeCompare(bSite);
        });

        dashEl.innerHTML = sorted.map(build_site_card).join("");
    }

    function run_report(value) {
        return frappe.call({
            method: "is_production.templates.pages.portal_site_volume_tracking.run_portal_report",
            args: {
                define_monthly_production: value
            },
            freeze: false
        });
    }

    function load_and_render(is_auto) {
        const val = input.value;

        if (!val) {
            statusEl.textContent = "Select a Define Monthly Production to load the dashboard.";
            return Promise.resolve();
        }

        localStorage.setItem(STORAGE_KEY, val);
        statusEl.textContent = is_auto ? "Refreshing..." : "Loading...";

        return run_report(val).then(function (r) {
            render_dashboard(r.message || {});

            const time = new Date().toLocaleTimeString([], {
                hour: "2-digit",
                minute: "2-digit"
            });

            statusEl.textContent = "Last updated: " + time + " (refreshes at :10 and :30)";
        }).catch(function (e) {
            console.error("Site Volume Tracking portal error:", e);
            statusEl.textContent = "Error loading dashboard data. Check browser console and server logs.";
            dashEl.innerHTML = '<div class="text-danger">Could not load data.</div>';
        });
    }

    async function search_define_monthly_production(term) {
        const r = await frappe.call({
            method: "is_production.templates.pages.portal_site_volume_tracking.search_define_monthly_production",
            args: {
                txt: term || ""
            }
        });

        return r.message || [];
    }

    async function render_dropdown() {
        const term = input.value || "";

        try {
            const results = await search_define_monthly_production(term);

            if (!results.length) {
                dropdown.innerHTML = '<div class="portal-empty">No matches found</div>';
                dropdown.style.display = "block";
                return;
            }

            dropdown.innerHTML = results.map(function (option) {
                return '<div class="portal-option" data-value="' + escapeHtml(option) + '">' + escapeHtml(option) + '</div>';
            }).join("");

            dropdown.style.display = "block";
        } catch (e) {
            console.error("Search failed:", e);
            dropdown.innerHTML = '<div class="portal-empty">No matches found</div>';
            dropdown.style.display = "block";
        }
    }

    input.addEventListener("focus", render_dropdown);
    input.addEventListener("input", render_dropdown);

    dropdown.addEventListener("mousedown", function (e) {
        const optionEl = e.target.closest(".portal-option");
        if (!optionEl) return;

        input.value = optionEl.getAttribute("data-value");
        dropdown.style.display = "none";

        load_and_render(false);
        start_aligned_refresh();
    });

    document.addEventListener("click", function (e) {
        const wrap = input.closest(".portal-filter");
        if (wrap && !wrap.contains(e.target)) {
            dropdown.style.display = "none";
        }
    });

    const last = localStorage.getItem(STORAGE_KEY);
    if (last) {
        input.value = last;
        load_and_render(false);
        start_aligned_refresh();
    }

    window.addEventListener("beforeunload", function () {
        if (_timer) clearTimeout(_timer);
    });
})();
</script>
{% endblock %}

{% extends "templates/web.html" %}

{% block page_content %}
<style>
html,
body {
    background: #ffffff !important;
    overflow: hidden !important;
}

header,
footer,
.web-footer,
.navbar,
.page-breadcrumbs,
.page-header,
.page-footer,
.footer-powered {
    display: none !important;
}

.web-page,
.page_content,
.page-content,
.page-content-wrapper,
main,
.container,
.container-fluid {
    max-width: none !important;
    width: 100% !important;
    padding: 0 !important;
    margin: 0 !important;
}

#portal-site-volume-tracking-app {
    position: fixed;
    inset: 0;
    z-index: 9999;
    background: #ffffff;
    overflow: auto;
    padding: 4px;
    box-sizing: border-box;
    font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    color: #1f272e;
}

.portal-topbar {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 8px;
    padding: 0 4px;
}

.portal-title {
    font-size: 16px;
    font-weight: 700;
    margin: 0;
    line-height: 32px;
    color: #111827;
    white-space: nowrap;
}

.portal-filter {
    width: 320px;
    position: relative;
}

.portal-filter input {
    width: 100%;
    height: 32px;
    border-radius: 8px;
    border: 1px solid #d1d8dd;
    padding: 4px 10px;
    background: #f7f7f7;
    color: #111827;
    font-size: 14px;
    outline: none;
}

.portal-filter input:focus {
    border-color: #9aa8b5;
    background: #ffffff;
}

.portal-dropdown {
    position: absolute;
    top: calc(100% + 4px);
    left: 0;
    right: 0;
    z-index: 10000;
    background: #fff;
    border: 1px solid #d1d8dd;
    border-radius: 8px;
    box-shadow: 0 6px 18px rgba(0,0,0,0.12);
    max-height: 260px;
    overflow-y: auto;
    display: none;
}

.portal-option {
    padding: 10px 12px;
    cursor: pointer;
    border-bottom: 1px solid #f3f3f3;
    font-size: 13px;
}

.portal-option:hover {
    background: #f7fafc;
}

.portal-empty {
    padding: 10px 12px;
    color: #6c757d;
    font-size: 13px;
}

#dashboard_status {
    margin: 0 0 8px 0;
    padding: 0 4px;
    color: #6c757d;
    font-size: 14px;
}

#dashboard_content {
    width: 100%;
}

/* =========================================================
   DESK-LIKE SITE VOLUME TRACKING CARD
   ========================================================= */

.isd-dashboard-card {
    border: 2px solid #000000;
    border-radius: 8px;
    margin: 0 0 10px 0;
    overflow: hidden;
    background: #ffffff;
}

.isd-dashboard-card-header {
    padding: 8px;
}

.isd-dashboard-card-title {
    font-size: 18px;
    font-weight: 400;
    line-height: 1.2;
    margin-bottom: 3px;
    color: #1f272e;
}

.isd-dashboard-card-subtitle {
    font-size: 12px;
    font-weight: 400;
    line-height: 1.2;
    color: #1f272e;
    text-transform: uppercase;
}

/* =========================================================
   KPI CARDS
   ========================================================= */

.isd-dashboard-kpi-row {
    display: grid;
    grid-template-columns: 130px 130px 174px 130px 130px 132px 150px 130px;
    gap: 7px;
    margin-top: 8px;
    align-items: stretch;
}

.isd-dashboard-kpi {
    background: #f4f4f4;
    border: 3px solid #000000;
    border-radius: 8px;
    padding: 6px 6px 5px 6px;
    min-height: 62px;
    text-align: center;
    color: #1f272e;
    box-sizing: border-box;
}

.isd-dashboard-kpi-label {
    font-size: 11px;
    line-height: 1.05;
    font-weight: 700;
    margin-bottom: 4px;
}

.isd-dashboard-kpi-sub-label {
    font-size: 11px;
    line-height: 1.05;
    margin-top: 1px;
}

.isd-dashboard-kpi-value {
    font-size: 18px;
    font-weight: 800;
    line-height: 1.15;
    margin-top: 6px;
}

.isd-dashboard-kpi-trend {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 4px;
}

.isd-dashboard-kpi-arrow {
    font-size: 18px;
    line-height: 1;
}

.isd-dashboard-good {
    background: #2fb34a !important;
    color: #ffffff !important;
}

.isd-dashboard-bad {
    background: #e84f53 !important;
    color: #ffffff !important;
}

/* =========================================================
   SUMMARY TABLE
   ========================================================= */

.isd-dashboard-table-wrap {
    padding: 6px;
    background: #ffffff;
}

.isd-dashboard-table {
    width: 100%;
    border-collapse: collapse;
    border: 4px solid #000000;
    background: #ffffff;
    table-layout: auto;
}

.isd-dashboard-th,
.isd-dashboard-td {
    border: 1px solid #000000;
    padding: 6px 6px;
    text-align: center;
    vertical-align: middle;
    font-size: 14px;
    line-height: 1.15;
    color: #1f272e;
    background: #ffffff;
    white-space: nowrap;
}

.isd-dashboard-th {
    font-weight: 800;
}

.isd-dashboard-td {
    font-weight: 400;
}

.isd-dashboard-sep {
    border-right: 3px solid #000000 !important;
}

.isd-dashboard-subsep {
    border-right: 1px solid #000000 !important;
}

.isd-dashboard-cell-inner {
    display: inline-block;
    padding: 2px 4px;
    min-width: 100%;
    box-sizing: border-box;
}

.isd-dashboard-var-good {
    background: #c9f2d8 !important;
}

.isd-dashboard-var-bad {
    background: #f9caca !important;
}

/* =========================================================
   RESPONSIVE
   ========================================================= */

@media (max-width: 1400px) {
    .isd-dashboard-kpi-row {
        grid-template-columns: repeat(4, minmax(130px, 1fr));
    }
}

@media (max-width: 800px) {
    .portal-topbar {
        flex-direction: column;
        align-items: flex-start;
        gap: 6px;
    }

    .portal-filter {
        width: 100%;
    }

    .isd-dashboard-kpi-row {
        grid-template-columns: repeat(2, minmax(130px, 1fr));
    }

    .isd-dashboard-table-wrap {
        overflow-x: auto;
    }

    .isd-dashboard-table {
        min-width: 1300px;
    }
}
</style>

<div id="portal-site-volume-tracking-app">
    <div class="portal-topbar">
        <h1 class="portal-title">Site Volume Tracking</h1>

        <div class="portal-filter">
            <input
                type="text"
                id="define_monthly_production"
                placeholder="Search Define Monthly Production"
                autocomplete="off"
            >
            <div id="define_monthly_production_dropdown" class="portal-dropdown"></div>
        </div>
    </div>

    <div id="dashboard_status">Select a Define Monthly Production to load the dashboard.</div>
    <div id="dashboard_content" class="isd-dashboard-grid"></div>
</div>

<script>
(function () {
    "use strict";

    const STORAGE_KEY = "portal_site_volume_tracking_define_monthly_production";

    /*
        This watchdog does NOT run the report every minute.
        It only checks every minute whether the :10 or :30 refresh was missed.
    */
    const WATCHDOG_INTERVAL_MS = 60 * 1000;

    /*
        If a Frappe call hangs longer than this, release the browser-side lock
        and allow the next watchdog/timer to try again.
    */
    const AJAX_TIMEOUT_MS = 2 * 60 * 1000;

    /*
        When the browser wakes/focuses again, refresh if the last successful
        refresh is older than this.
    */
    const WAKE_REFRESH_AFTER_MS = 2 * 60 * 1000;

    const input = document.getElementById("define_monthly_production");
    const dropdown = document.getElementById("define_monthly_production_dropdown");
    const statusEl = document.getElementById("dashboard_status");
    const dashEl = document.getElementById("dashboard_content");

    let _refreshing = false;
    let _timer = null;
    let _watchdog = null;
    let _lastSuccessAt = 0;
    let _lastSlotKeyRefreshed = "";
    let _lastLoadFailed = false;
    let _requestSeq = 0;

    function escapeHtml(value) {
        return String(value == null ? "" : value)
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;")
            .replace(/'/g, "&#39;");
    }

    function fmtInt(n) {
        const x = Number(n || 0);
        return Math.round(x).toLocaleString();
    }

    function fmtDecimal(n, decimals) {
        decimals = decimals == null ? 1 : decimals;
        const x = Number(n || 0);

        return x.toLocaleString(undefined, {
            minimumFractionDigits: decimals,
            maximumFractionDigits: decimals
        });
    }

    function formatTime(date) {
        return date.toLocaleTimeString([], {
            hour: "2-digit",
            minute: "2-digit"
        });
    }

    function pad2(value) {
        return String(value).padStart(2, "0");
    }

    function slotKey(date) {
        return (
            date.getFullYear() + "-" +
            pad2(date.getMonth() + 1) + "-" +
            pad2(date.getDate()) + " " +
            pad2(date.getHours()) + ":" +
            pad2(date.getMinutes())
        );
    }

    function mostRecentRefreshSlot(now) {
        const slot = new Date(now.getTime());
        slot.setSeconds(0, 0);

        const minutes = slot.getMinutes();

        if (minutes >= 30) {
            slot.setMinutes(30);
        } else if (minutes >= 10) {
            slot.setMinutes(10);
        } else {
            slot.setHours(slot.getHours() - 1);
            slot.setMinutes(30);
        }

        return slot;
    }

    function msUntilNextRefresh() {
        const now = new Date();
        const next = new Date(now.getTime());
        next.setSeconds(0, 0);

        const minutes = now.getMinutes();

        if (minutes < 10) {
            next.setMinutes(10);
        } else if (minutes < 30) {
            next.setMinutes(30);
        } else {
            next.setHours(next.getHours() + 1);
            next.setMinutes(10);
        }

        return Math.max(1000, next.getTime() - now.getTime());
    }

    function goodBadClassFromValue(val) {
        const v = Number(val || 0);
        return v >= 0 ? "isd-dashboard-good" : "isd-dashboard-bad";
    }

    function arrowUpDown(val) {
        const v = Number(val || 0);
        return v >= 0 ? "▲" : "▼";
    }

    function varianceClass(value) {
        return Number(value || 0) >= 0
            ? "isd-dashboard-var-good"
            : "isd-dashboard-var-bad";
    }

    function kpiBox(label, value, opts) {
        opts = opts || {};

        const coloured = !!opts.coloured;
        const showArrow = !!opts.showArrow;
        const sublabel = opts.sublabel || "";
        const formatter = typeof opts.formatter === "function" ? opts.formatter : fmtInt;

        let classes = "isd-dashboard-kpi";
        let arrow = "";
        let inlineStyle = "";

        if (opts.customBackground) {
            inlineStyle += "background:" + opts.customBackground + ";";
        }

        if (opts.customTextColor) {
            inlineStyle += "color:" + opts.customTextColor + ";";
        }

        if (coloured) {
            classes += " " + goodBadClassFromValue(value);

            if (showArrow) {
                arrow = arrowUpDown(value);
            }
        }

        return (
            '<div class="' + classes + '" style="' + inlineStyle + '">' +
                '<div class="isd-dashboard-kpi-label">' + escapeHtml(label) + '</div>' +
                (
                    sublabel
                        ? '<div class="isd-dashboard-kpi-sub-label">' + escapeHtml(sublabel) + '</div>'
                        : '<div class="isd-dashboard-kpi-sub-label">&nbsp;</div>'
                ) +
                '<div class="isd-dashboard-kpi-value">' +
                    '<span class="isd-dashboard-kpi-trend">' +
                        (arrow ? '<span class="isd-dashboard-kpi-arrow">' + arrow + '</span>' : '') +
                        '<span>' + formatter(value) + '</span>' +
                    '</span>' +
                '</div>' +
            '</div>'
        );
    }

    function kpiRequiredVsOriginal(label, required, original) {
        const req = Number(required || 0);
        const orig = Number(original || 0);

        const good = req <= orig;
        const cls = good ? "isd-dashboard-good" : "isd-dashboard-bad";
        const arrow = good ? "▲" : "▼";

        return (
            '<div class="isd-dashboard-kpi ' + cls + '">' +
                '<div class="isd-dashboard-kpi-label">' + escapeHtml(label) + '</div>' +
                '<div class="isd-dashboard-kpi-sub-label">&nbsp;</div>' +
                '<div class="isd-dashboard-kpi-value">' +
                    '<span class="isd-dashboard-kpi-trend">' +
                        '<span class="isd-dashboard-kpi-arrow">' + arrow + '</span>' +
                        '<span>' + fmtInt(req) + '</span>' +
                    '</span>' +
                '</div>' +
            '</div>'
        );
    }

    function th(text, sepClass) {
        sepClass = sepClass || "";

        const classes = ["isd-dashboard-th"];
        if (sepClass) {
            classes.push(sepClass);
        }

        return (
            '<th class="' + classes.join(" ") + '">' +
                '<span class="isd-dashboard-cell-inner">' + escapeHtml(text) + '</span>' +
            '</th>'
        );
    }

    function td(value, opts) {
        opts = opts || {};

        const classes = ["isd-dashboard-td"];
        const innerClasses = ["isd-dashboard-cell-inner"];

        if (opts.sepClass) {
            classes.push(opts.sepClass);
        }

        if (opts.varClass) {
            innerClasses.push(opts.varClass);
        }

        return (
            '<td class="' + classes.join(" ") + '">' +
                '<span class="' + innerClasses.join(" ") + '">' + fmtInt(value) + '</span>' +
            '</td>'
        );
    }

    function buildSummaryTable(r) {
        const mtdVar = Number(r.mtd_var_bcm || 0);
        const coalVar = Number(r.mtd_coal_var_t || 0);
        const wasteVar = Number(r.mtd_waste_var_bcm || 0);
        const dayVar = Number(r.day_var_bcm || 0);

        return (
            '<table class="isd-dashboard-table isd-dashboard-table--summary">' +
                '<tr>' +
                    th("Month Target(bcm)", "isd-dashboard-subsep") +
                    th("Month Coal(t)", "isd-dashboard-subsep") +
                    th("Month Waste(bcm)", "isd-dashboard-sep") +

                    th("MTD Act(bcm)", "isd-dashboard-subsep") +
                    th("MTD Plan(bcm)", "isd-dashboard-subsep") +
                    th("Var", "isd-dashboard-sep") +

                    th("MTD C (t)", "isd-dashboard-subsep") +
                    th("MTD C Plan(t)", "isd-dashboard-subsep") +
                    th("Var C", "isd-dashboard-sep") +

                    th("MTD W (bcm)", "isd-dashboard-subsep") +
                    th("MTD W Plan(bcm)", "isd-dashboard-subsep") +
                    th("Var W", "isd-dashboard-sep") +

                    th("Day BCM", "isd-dashboard-subsep") +
                    th("Day Target(bcm)", "isd-dashboard-subsep") +
                    th("Day Var", "isd-dashboard-sep") +
                '</tr>' +
                '<tr>' +
                    td(r.month_target_bcm, { sepClass: "isd-dashboard-subsep" }) +
                    td(r.month_coal_t, { sepClass: "isd-dashboard-subsep" }) +
                    td(r.month_waste_bcm, { sepClass: "isd-dashboard-sep" }) +

                    td(r.mtd_act_bcm, { sepClass: "isd-dashboard-subsep" }) +
                    td(r.mtd_plan_bcm, { sepClass: "isd-dashboard-subsep" }) +
                    td(r.mtd_var_bcm, {
                        sepClass: "isd-dashboard-sep",
                        varClass: varianceClass(mtdVar)
                    }) +

                    td(r.mtd_coal_t, { sepClass: "isd-dashboard-subsep" }) +
                    td(r.mtd_coal_plan_t, { sepClass: "isd-dashboard-subsep" }) +
                    td(r.mtd_coal_var_t, {
                        sepClass: "isd-dashboard-sep",
                        varClass: varianceClass(coalVar)
                    }) +

                    td(r.mtd_waste_bcm, { sepClass: "isd-dashboard-subsep" }) +
                    td(r.mtd_waste_plan_bcm, { sepClass: "isd-dashboard-subsep" }) +
                    td(r.mtd_waste_var_bcm, {
                        sepClass: "isd-dashboard-sep",
                        varClass: varianceClass(wasteVar)
                    }) +

                    td(r.day_bcm, { sepClass: "isd-dashboard-subsep" }) +
                    td(r.day_target_bcm, { sepClass: "isd-dashboard-subsep" }) +
                    td(r.day_var_bcm, {
                        sepClass: "isd-dashboard-sep",
                        varClass: varianceClass(dayVar)
                    }) +
                '</tr>' +
            '</table>'
        );
    }

    function getHeaderBackgroundStyle(site, siteColourMap) {
        const mappedColour = siteColourMap && siteColourMap[site]
            ? String(siteColourMap[site]).trim()
            : "";

        if (!mappedColour) {
            return "background:transparent;";
        }

        return "background:" + escapeHtml(mappedColour) + ";";
    }

    function buildSiteCard(r, siteColourMap) {
        const site = String(r.site || "").trim();
        const start = r.prod_start ? frappe.datetime.str_to_user(r.prod_start) : "";
        const end = r.prod_end ? frappe.datetime.str_to_user(r.prod_end) : "";
        const forecastVar = Number(r.forecast_var || 0);
        const employeeLabel = "Employees: " + fmtInt(r.employee_count || 0);
        const headerBackground = getHeaderBackgroundStyle(site, siteColourMap);

        return (
            '<div class="isd-dashboard-card">' +
                '<div class="isd-dashboard-card-header" style="' + headerBackground + '">' +
                    '<div class="isd-dashboard-card-title">SITE: ' + escapeHtml(site) + '</div>' +
                    '<div class="isd-dashboard-card-subtitle">' +
                        'PRODUCTION PERIOD: ' + escapeHtml(start) + ' → ' + escapeHtml(end) +
                    '</div>' +

                    '<div class="isd-dashboard-kpi-row">' +
                        kpiBox("Month Target", r.month_target_bcm) +
                        kpiBox("Forecast", r.forecast_bcm) +
                        kpiBox("Var: Forecast vs.Month Target", forecastVar, {
                            coloured: true,
                            showArrow: true
                        }) +
                        kpiBox("Days Left in Month", r.days_left) +
                        kpiBox("Original Daily Target", r.original_daily_target) +
                        kpiBox("Current Avg per Day", r.current_avg_per_day) +
                        kpiRequiredVsOriginal(
                            "Required Daily for Target",
                            r.required_daily,
                            r.original_daily_target
                        ) +
                        kpiBox("Projected BCM/man", r.projected_bcm_per_man, {
                            sublabel: employeeLabel,
                            formatter: function (v) { return fmtDecimal(v, 1); },
                            customBackground: "#d9f0ff",
                            customTextColor: "#000000"
                        }) +
                    '</div>' +
                '</div>' +

                '<div class="isd-dashboard-table-wrap">' +
                    buildSummaryTable(r) +
                '</div>' +
            '</div>'
        );
    }

    function sortRows(rows, siteOrderMap) {
        return rows.slice().sort(function (a, b) {
            const aSite = String(a.site || "").trim();
            const bSite = String(b.site || "").trim();

            const aHasOrder = Object.prototype.hasOwnProperty.call(siteOrderMap, aSite);
            const bHasOrder = Object.prototype.hasOwnProperty.call(siteOrderMap, bSite);

            if (aHasOrder && bHasOrder) {
                return siteOrderMap[aSite] - siteOrderMap[bSite];
            }

            if (aHasOrder) {
                return -1;
            }

            if (bHasOrder) {
                return 1;
            }

            return aSite.localeCompare(bSite);
        });
    }

    function renderDashboard(response) {
        const rows = response.rows || [];
        const siteOrderMap = response.site_order_map || {};
        const siteColourMap = response.site_colour_map || {};

        if (!rows.length) {
            dashEl.innerHTML = '<div class="text-muted">No data for the selected filter.</div>';
            return;
        }

        const sorted = sortRows(rows, siteOrderMap);
        dashEl.innerHTML = sorted.map(function (row) {
            return buildSiteCard(row, siteColourMap);
        }).join("");
    }

    function selectedValue() {
        return String(input.value || "").trim();
    }

    function clearExistingTimer() {
        if (_timer) {
            clearTimeout(_timer);
            _timer = null;
        }
    }

    function scheduleNextRefresh() {
        clearExistingTimer();

        if (!selectedValue()) {
            return;
        }

        _timer = setTimeout(function () {
            refreshForDueSlot("aligned-timer");
        }, msUntilNextRefresh());
    }

    function runReport(value) {
        return frappe.call({
            method: "is_production.templates.pages.portal_site_volume_tracking.run_portal_report",
            args: {
                define_monthly_production: value,
                request_time: new Date().toISOString()
            },
            freeze: false
        });
    }

    function withTimeout(promise, timeoutMs) {
        let timeoutHandle = null;

        const timeoutPromise = new Promise(function (_resolve, reject) {
            timeoutHandle = setTimeout(function () {
                reject(new Error("Refresh request timed out after " + Math.round(timeoutMs / 1000) + " seconds."));
            }, timeoutMs);
        });

        return Promise.race([promise, timeoutPromise]).finally(function () {
            if (timeoutHandle) {
                clearTimeout(timeoutHandle);
            }
        });
    }

    function loadAndRender(isAuto, reason) {
        const val = selectedValue();

        if (!val) {
            statusEl.textContent = "Select a Define Monthly Production to load the dashboard.";
            dashEl.innerHTML = "";
            return Promise.resolve(false);
        }

        if (_refreshing) {
            const inFlightAge = Date.now() - _lastSuccessAt;

            if (inFlightAge < AJAX_TIMEOUT_MS) {
                return Promise.resolve(false);
            }

            _refreshing = false;
        }

        _refreshing = true;
        _requestSeq += 1;

        const thisRequestSeq = _requestSeq;

        localStorage.setItem(STORAGE_KEY, val);
        statusEl.textContent = isAuto ? "Refreshing..." : "Loading...";

        return withTimeout(runReport(val), AJAX_TIMEOUT_MS).then(function (r) {
            if (thisRequestSeq !== _requestSeq) {
                return false;
            }

            renderDashboard(r.message || {});

            const now = new Date();
            const time = formatTime(now);

            _lastSuccessAt = now.getTime();
            _lastLoadFailed = false;
            _lastSlotKeyRefreshed = slotKey(mostRecentRefreshSlot(now));

            statusEl.textContent = "Last updated: " + time + " (refreshes at :10 and :30)";

            if (isAuto && frappe.show_alert) {
                frappe.show_alert({
                    message: "Site Volume Tracking updated at " + time,
                    indicator: "green"
                }, 5);
            }

            return true;
        }).catch(function (e) {
            if (thisRequestSeq !== _requestSeq) {
                return false;
            }

            console.error("Site Volume Tracking portal error:", e);
            _lastLoadFailed = true;

            statusEl.textContent = "Error loading Site Volume Tracking. Retrying automatically at :10 and :30.";
            dashEl.innerHTML = (
                '<div class="text-danger">' +
                    "Could not load data. Check browser console and server logs." +
                '</div>'
            );

            return false;
        }).finally(function () {
            if (thisRequestSeq === _requestSeq) {
                _refreshing = false;
            }

            scheduleNextRefresh();
        });
    }

    function refreshForDueSlot(reason) {
        if (!selectedValue()) {
            return;
        }

        if (_refreshing) {
            return;
        }

        const now = new Date();
        const dueSlot = mostRecentRefreshSlot(now);
        const dueKey = slotKey(dueSlot);

        if (dueKey === _lastSlotKeyRefreshed && !_lastLoadFailed) {
            scheduleNextRefresh();
            return;
        }

        loadAndRender(true, reason);
    }

    function refreshAfterWake(reason) {
        if (!selectedValue()) {
            return;
        }

        if (_refreshing) {
            return;
        }

        const now = Date.now();

        if (_lastLoadFailed || !_lastSuccessAt || now - _lastSuccessAt >= WAKE_REFRESH_AFTER_MS) {
            loadAndRender(true, reason);
        } else {
            scheduleNextRefresh();
        }
    }

    function startRefreshEngine() {
        scheduleNextRefresh();

        if (!_watchdog) {
            _watchdog = setInterval(function () {
                refreshForDueSlot("watchdog");
            }, WATCHDOG_INTERVAL_MS);
        }
    }

    async function searchDefineMonthlyProduction(term) {
        const r = await frappe.call({
            method: "is_production.templates.pages.portal_site_volume_tracking.search_define_monthly_production",
            args: {
                txt: term || ""
            },
            freeze: false
        });

        return r.message || [];
    }

    async function renderDropdown() {
        const term = input.value || "";

        try {
            const results = await searchDefineMonthlyProduction(term);

            if (!results.length) {
                dropdown.innerHTML = '<div class="portal-empty">No matches found</div>';
                dropdown.style.display = "block";
                return;
            }

            dropdown.innerHTML = results.map(function (option) {
                return '<div class="portal-option" data-value="' + escapeHtml(option) + '">' + escapeHtml(option) + '</div>';
            }).join("");

            dropdown.style.display = "block";
        } catch (e) {
            console.error("Search failed:", e);
            dropdown.innerHTML = '<div class="portal-empty">No matches found</div>';
            dropdown.style.display = "block";
        }
    }

    input.addEventListener("focus", renderDropdown);
    input.addEventListener("input", renderDropdown);

    dropdown.addEventListener("mousedown", function (e) {
        const optionEl = e.target.closest(".portal-option");
        if (!optionEl) return;

        input.value = optionEl.getAttribute("data-value");
        dropdown.style.display = "none";

        _lastSuccessAt = 0;
        _lastSlotKeyRefreshed = "";
        _lastLoadFailed = false;

        loadAndRender(false, "manual-select");
        startRefreshEngine();
    });

    document.addEventListener("click", function (e) {
        const wrap = input.closest(".portal-filter");
        if (wrap && !wrap.contains(e.target)) {
            dropdown.style.display = "none";
        }
    });

    document.addEventListener("visibilitychange", function () {
        if (!document.hidden) {
            refreshAfterWake("visibilitychange");
        }
    });

    window.addEventListener("focus", function () {
        refreshAfterWake("focus");
    });

    window.addEventListener("pageshow", function () {
        refreshAfterWake("pageshow");
    });

    window.addEventListener("online", function () {
        refreshAfterWake("online");
    });

    window.addEventListener("beforeunload", function () {
        clearExistingTimer();

        if (_watchdog) {
            clearInterval(_watchdog);
            _watchdog = null;
        }
    });

    const last = localStorage.getItem(STORAGE_KEY);

    if (last) {
        input.value = last;
        loadAndRender(false, "restore-selection");
        startRefreshEngine();
    } else {
        statusEl.textContent = "Select a Define Monthly Production to load the dashboard.";
    }
})();
</script>
{% endblock %}
